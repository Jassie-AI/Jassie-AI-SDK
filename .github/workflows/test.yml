name: SDK Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build SDK
        run: npm run build

      - name: Run SDK tests
        env:
          JASSIE_API_KEY: ${{ secrets.JASSIE_API_KEY }}
        run: node test-sdk.mjs
